[tool.pytest.ini_options]
asyncio_mode = "strict"
timeout = 60

[tool.ruff]
line-length = 120

[tool.ruff.lint.per-file-ignores]
"api/websocket.py" = ["E402"]
"tests/*.py" = ["E402"]
"tests/**/*.py" = ["E402"]
"workers/*.py" = ["E402"]
"workers/**/*.py" = ["E402"]
"services/simulation/__init__.py" = ["E402"]
