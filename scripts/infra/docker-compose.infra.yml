services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: ${POSTGRES_CONTAINER_NAME:-homerun-postgres}
    # Tuning for a single-user local trading app on commodity hardware.
    # These values were validated in production: 96.93% buffer-cache hit
    # ratio sustained, with the 21 GB DB's hot working set fitting
    # comfortably in 4 GB shared_buffers.  Persist them HERE in source
    # control rather than only in the data volume's postgresql.conf so
    # they survive ``docker volume rm``.
    command:
      - postgres
      # Connection limit (was the only setting before this commit)
      - -c
      - max_connections=200
      # Memory — the cache that makes 97% hit-rate possible
      - -c
      - shared_buffers=4GB
      - -c
      - effective_cache_size=10GB
      - -c
      - work_mem=32MB
      - -c
      - maintenance_work_mem=1GB
      # Durability vs latency — synchronous_commit=off means a power
      # loss can lose ~100ms of recent writes.  Acceptable for a
      # single-user local app; the bot can re-derive any lost state
      # from the next reconciliation cycle.  Saves ~5ms / commit.
      - -c
      - synchronous_commit=off
      - -c
      - wal_compression=on
      - -c
      - max_wal_size=4GB
      - -c
      - checkpoint_completion_target=0.9
      # Autovacuum — keep it active enough to prevent table bloat from
      # the high-churn worker_snapshot / live_trading_orders tables
      # (already mostly-HOT updates, but autovacuum still needs to run).
      - -c
      - autovacuum_max_workers=5
      - -c
      - autovacuum_naptime=15s
      - -c
      - autovacuum_vacuum_cost_limit=2000
      # Planner — assume SSD storage and plenty of OS-level read-ahead.
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      # Statement-level safety nets.  statement_timeout is a hard
      # backstop above any client-side wait_for; lock_timeout fails
      # fast on lock waits so we don't burn the full 60s ceiling on
      # row-lock cascades.
      - -c
      - statement_timeout=60000
      - -c
      - lock_timeout=5000
      # Pre-2026-04-29 this was 30000 (30s).  Postgres logs showed a
      # cluster of 14+ FATAL "terminating connection due to idle-in-
      # transaction timeout" within ONE second every 2-4 minutes —
      # ``sessions_fatal=3511`` over 7h.  The application's own
      # client-side cap (``DATABASE_IDLE_IN_TRANSACTION_TIMEOUT_MS``)
      # is supposed to fire first, but the worker's chronic 30-43s
      # transaction-holds (slow signal_loop + setup) routinely
      # exceeded BOTH the client cap and the server cap, so the
      # server killed them en masse and the cascade we observed in
      # the application logs (``cannot switch to state X``,
      # ``InterfaceError``, mass invalidation) is the AFTERMATH of
      # the FATALs.  Bumped to 120000 (2 min) to give the application
      # headroom while still catching truly-leaked transactions —
      # nothing legitimate should sit idle-in-tx for >2 min.  The
      # right long-term fix is to wrap external I/O (HTTP/RPC) in
      # ``release_conn(session)`` so transactions don't span network
      # waits; this is the safety net.
      - -c
      - idle_in_transaction_session_timeout=120000
      # Stats collection for pg_stat_statements (used by perf
      # investigations to identify slow queries by mean exec time).
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - track_activity_query_size=2048
    shm_size: '5g'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-homerun}
      POSTGRES_USER: ${POSTGRES_USER:-homerun}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-homerun}
    ports:
      - "${POSTGRES_HOST:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - homerun-postgres-data:/var/lib/postgresql/data

volumes:
  homerun-postgres-data:
    # Pin to the actual volume that contains the user's database.
    # ``external: true`` + explicit ``name`` decouples the volume
    # binding from Compose's project-prefix convention — running
    # ``docker compose up`` from the ``infra/`` directory previously
    # created a NEW empty ``infra_homerun-postgres-data`` volume
    # while the real data lived in ``homerun_homerun-postgres-data``,
    # which caused alembic to re-apply every migration against an
    # empty database and the backend to fail at startup.
    external: true
    name: homerun_homerun-postgres-data
